plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.chatterloop.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    dependencies {
        implementation "com.google.android.material:material:1.13.0-alpha08"
        // ShortcutManagerCompat / ShortcutInfoCompat / Person / IconCompat,
        // used by ConversationShortcuts.kt. Reaches the classpath transitively
        // via the Flutter embedding too, but conversation shortcuts are the
        // only reason any of it is compiled against directly - so declare it
        // rather than depend on someone else's transitive graph.
        implementation "androidx.core:core-ktx:1.13.1"
        // flutter_local_notifications 19.x uses java.time APIs that require
        // core library desugaring to run on the app's minSdk (23).
        coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    }


    compileOptions {
        // Enables the desugared java.time backport used above.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.chatterloop.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // record_android requires minSdk 23 (Android 6.0) - bumped from
        // Flutter's own default (flutter.minSdkVersion, 21) per its own
        // manifest-merger error/suggested fix. Drops support for
        // Android 5.0/5.1 devices, which are vanishingly rare at this point.
        minSdkVersion = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            // signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
